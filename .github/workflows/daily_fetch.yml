name: Tägliches Pegel-Update

on:
  schedule:
    - cron: '0 16 * * *' # Läuft täglich um 16:00 Uhr
  workflow_dispatch:      # Ermöglicht manuelles Starten über den Button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Erlaubt dem Bot, Dateien ins Repo zu schreiben
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Fetch Data
        run: python src/data_fetcher.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git commit -m "Update Pegeldaten" || echo "Keine Änderungen"
          git push
      - name: Fetch Data
        run: python src/data_fetcher.py
        
      - name: Send Telegram Report
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/bot_reporter.py
